
name: build
on: [pull_request, push]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      # 1. 拉取代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 强制使用官方 Gradle 源（保留版本号）
      - name: Force official Gradle distribution
        run: |
          sed -i 's#https://[^/]*/gradle/#https://services.gradle.org/distributions/#g' gradle/wrapper/gradle-wrapper.properties

      # 3. 安装 Java
      - name: Setup JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: 25
          distribution: 'temurin'

      # 4. 缓存 Gradle（关键优化）
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # 5. 赋予执行权限
      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      # 6. 构建
      - name: Build
        run: ./gradlew build --no-daemon

      # 7. 上传构建产物
      - name: Upload artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Artifacts
          path: build/libs/